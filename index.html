<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Синхронное Колесо Фортуны</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --primary: #8b5cf6;
            --text: #f8fafc;
            --panel: #1e293b;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 { color: var(--primary); text-align: center; }
        .container {
            background: var(--panel);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 100px;
            background: #334155;
            color: white;
            border: 2px solid var(--primary);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
            resize: none;
        }
        input[type="number"], input[type="text"] {
            width: 100%;
            background: #334155;
            color: white;
            border: 2px solid var(--primary);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        button:hover { background: #7c3aed; transform: translateY(-2px); }
        
        #wheel-screen { display: none; }
        .timer { font-size: 48px; font-weight: bold; font-variant-numeric: tabular-nums; margin: 20px 0; color: #cbd5e1; }
        
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
        }
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 5s cubic-bezier(0.25, 1, 0.1, 1);
        }
        .arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid var(--primary);
            z-index: 10;
        }
        #result {
            font-size: 24px;
            font-weight: bold;
            color: #10b981;
            min-height: 35px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="setup-screen" class="container">
        <h1>⚙️ Настройка колеса</h1>
        <p>Введите варианты (каждый с новой строки):</p>
        <textarea id="options-input">Пицца
Суши
Бургеры
Шаурма</textarea>
        
        <p>Таймер до старта (в секундах):</p>
        <input type="number" id="timer-input" value="60" min="5">
        
        <button onclick="generateLink()">Создать ссылку и начать</button>
    </div>

    <div id="wheel-screen" class="container">
        <h1>Колесо Фортуны</h1>
        
        <p>Ссылка для приглашения друзей:</p>
        <input type="text" id="share-link" readonly onclick="this.select()">
        
        <div class="timer" id="timer-display">00:00</div>
        
        <div class="wheel-container">
            <div class="arrow"></div>
            <canvas id="wheel-canvas" width="400" height="400"></canvas>
        </div>
        
        <div id="result">Ожидание...</div>
    </div>

    <script>
        function seededRandom(seed) {
            let t = seed += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }

        const colors = ['#f43f5e', '#ec4899', '#d946ef', '#a855f7', '#8b5cf6', '#6366f1', '#3b82f6', '#0ea5e9'];
        let options = [];
        let spinResultIndex = 0;
        let isSpinning = false;

        const urlParams = new URLSearchParams(window.location.search);
        const urlOptions = urlParams.get('opts');
        const urlEndTime = parseInt(urlParams.get('end'));
        const urlSeed = parseInt(urlParams.get('seed'));

        if (urlOptions && urlEndTime && urlSeed) {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('wheel-screen').style.display = 'block';
            
            options = decodeURIComponent(urlOptions).split(',');
            document.getElementById('share-link').value = window.location.href;
            
            drawWheel();
            startCountdown(urlEndTime, urlSeed);
        }

        function generateLink() {
            const optsText = document.getElementById('options-input').value.trim();
            if (!optsText) return alert("Введите варианты!");
            
            const optsArray = optsText.split('\n').filter(o => o.trim() !== '');
            const timerSeconds = parseInt(document.getElementById('timer-input').value);
            
            const endTime = Date.now() + (timerSeconds * 1000);
            const randomSeed = Math.floor(Math.random() * 999999);
            
            const params = new URLSearchParams();
            params.set('opts', encodeURIComponent(optsArray.join(',')));
            params.set('end', endTime);
            params.set('seed', randomSeed);
            
            const newUrl = window.location.origin + window.location.pathname + '?' + params.toString();
            window.location.href = newUrl;
        }

        function drawWheel() {
            const canvas = document.getElementById('wheel-canvas');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = centerX;
            
            const sliceAngle = (2 * Math.PI) / options.length;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < options.length; i++) {
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.closePath();
                
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 20px sans-serif";
                ctx.fillText(options[i], radius - 20, 10);
                ctx.restore();
            }
        }

        function startCountdown(endTime, seed) {
            const timerDisplay = document.getElementById('timer-display');
            
            const interval = setInterval(() => {
                const now = Date.now();
                const timeLeft = Math.max(0, Math.floor((endTime - now) / 1000));
                
                const minutes = String(Math.floor(timeLeft / 60)).padStart(2, '0');
                const seconds = String(timeLeft % 60).padStart(2, '0');
                timerDisplay.innerText = `${minutes}:${seconds}`;

                if (timeLeft <= 0) {
                    clearInterval(interval);
                    timerDisplay.innerText = "КРУТИМ!";
                    spinWheel(seed);
                }
            }, 1000);
        }

        function spinWheel(seed) {
            if (isSpinning) return;
            isSpinning = true;

            const canvas = document.getElementById('wheel-canvas');
            const resultDisplay = document.getElementById('result');
            
            const randomValue = seededRandom(seed);
            spinResultIndex = Math.floor(randomValue * options.length);
            
            const sliceAngle = 360 / options.length;
            const spinAmount = 360 * 5; 
            const targetDegree = spinAmount + (270 - (spinResultIndex * sliceAngle + sliceAngle / 2));
            
            canvas.style.transform = `rotate(${targetDegree}deg)`;
            
            setTimeout(() => {
                resultDisplay.innerText = `🎉 Выпало: ${options[spinResultIndex]}!`;
                resultDisplay.style.color = '#10b981';
            }, 5000);
        }
    </script>
</body>
</html>
